# Fedora 41 kickstart for k8labs base image
# Minimal installation — only what is required to boot and host sysext/confext extensions.
# Install source URL; override via Packer variable at build time
url --url="http://download.fedoraproject.org/pub/fedora/linux/releases/41/Everything/x86_64/os/"

# Use text-mode installation
text

# Root password (plaintext for lab use; set in Packer SSH config for provisioning)
rootpw k8sosroot

# Disk configuration
autopart --type=lvm
clearpart --all --initlabel

# Network: DHCP on first interface
network --bootproto=dhcp --device=link --activate

# Locale and timezone
lang en_US.UTF-8
keyboard us
timezone UTC

# Security
firewall --disabled
selinux --permissive

# Services
services --enabled=sshd

# Skip X11 and graphical packages
skipx

# Package selection — minimal base + lab essentials
%packages --excludedocs
@core
systemd
openssh-server
openssh-clients
qemu-guest-agent
cloud-init
systemd-container
device-mapper
lvm2
curl
ca-certificates
sudo
vim-minimal
NetworkManager
%end

# Post-install: enable guest agent, prepare extension directories, clean up, configure SSH
%post --log=/root/post-install.log

# Enable qemu-guest-agent for VM management
systemctl enable qemu-guest-agent

# Allow root SSH login with password for Packer provisioning (lab use only)
sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
cat > /etc/ssh/sshd_config.d/01-permitroot.conf <<'SSH_EOF'
PermitRootLogin yes
PasswordAuthentication yes
SSH_EOF

# Create extension metadata directories for sysext and confext
# These are populated at boot from extension release images
mkdir -p /etc/extensions

# Disable firewalld (firewall already disabled via kickstart, but ensure service is masked)
systemctl mask firewalld

# Clear package cache to reduce image size
rm -rf /var/cache/dnf/*
rm -rf /var/lib/dnf/history.sqlite*
rm -rf /tmp/*

%end

# Reboot after installation
reboot
