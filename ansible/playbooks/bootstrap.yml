---
# bootstrap.yml — Full KTHW cluster bootstrap via Ansible
#
# Stages:
#   1. deploy-extensions — Copy .raw files + activate sysext/confext
#   2. generate-certs   — Generate TLS certificates (locally, via community.crypto)
#   3. distribute-certs — Copy certs to control-plane
#   4. start-etcd      — Configure and start etcd on CP
#   5. start-cp        — Start kube-apiserver, controller-manager, scheduler on CP
#   6. distribute-kubelet-certs — Per-node kubelet certs + kubeconfigs
#   7. start-kubelet   — Start kubelet on all nodes
#   8. kubelet-rbac    — Apply RBAC rules for kubelet self-registration
#   9. install-cilium  — Install Cilium CNI + L2 manifests
#   10. host-route     — Add host route for LB pool
#   11. health-check   — Verify cluster health
#
# Usage:
#   cd ansible && ansible-playbook playbooks/bootstrap.yml
#
# Prerequisites:
#   - tofu apply has been run (VMs exist with SSH access)
#   - Extensions built (make sysexts confexts)
#   - community.crypto collection installed (ansible-galaxy collection install -r requirements.yml)

- name: Stage 1 — Deploy extensions to all cluster nodes
  ansible.builtin.import_playbook: deploy-extensions.yml

- name: Stage 2 — Generate TLS certificates locally
  hosts: localhost
  connection: local
  gather_facts: false
  tags: certs
  vars:
    certs_dir: "{{ playbook_dir }}/../../certs"
    cp_ip: "{{ hostvars[groups['control_plane'][0]]['ansible_host'] }}"
    kubernetes_svc_ip: "10.96.0.1"
  roles:
    - role: certs
      run_once: true

- name: Stage 3 — Distribute certs to control-plane
  hosts: control_plane
  gather_facts: false
  vars:
    certs_dir: "{{ playbook_dir }}/../../certs"
    cp_ip: "{{ ansible_host }}"
  tasks:
    - name: Ensure /etc/kubernetes directories exist
      ansible.builtin.raw: mkdir -p /etc/kubernetes/pki /etc/kubernetes/manifests /var/lib/kubelet/pki
      changed_when: false

    - name: Copy admin kubeconfig to CP
      ansible.builtin.copy:
        src: "{{ certs_dir }}/admin.kubeconfig"
        dest: /etc/kubernetes/admin.kubeconfig
        mode: "0600"

    - name: Include kubernetes-cp role (distribution only — services started after etcd)
      ansible.builtin.include_role:
        name: kubernetes-cp
        tasks_from: distribute-certs

- name: Stage 4 — Start etcd on control-plane
  hosts: control_plane
  gather_facts: false
  vars:
    cp_ip: "{{ ansible_host }}"
  roles:
    - role: etcd

- name: Stage 5 — Start control-plane services (apiserver, controller-manager, scheduler)
  hosts: control_plane
  gather_facts: false
  vars:
    certs_dir: "{{ playbook_dir }}/../../certs"
    cp_ip: "{{ ansible_host }}"
  tasks:
    - name: Resolve {{CP_IP}} placeholder in kube-apiserver systemd unit
      ansible.builtin.replace:
        path: /usr/lib/systemd/system/kube-apiserver.service
        regexp: "{{ '{{CP_IP}}' }}"
        replace: "{{ cp_ip }}"
      failed_when: false

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Start kube-apiserver
      ansible.builtin.systemd:
        name: kube-apiserver
        state: started
        enabled: true
      register: apiserver_start

    - name: Wait for kube-apiserver process to become active (up to 30s)
      ansible.builtin.command:
        cmd: systemctl is-active kube-apiserver
      register: apiserver_active
      retries: 6
      delay: 5
      until: apiserver_active.stdout == "active"
      failed_when: false
      changed_when: false

    - name: Show kube-apiserver logs on failure
      ansible.builtin.command:
        cmd: journalctl -u kube-apiserver --no-pager -n 40
      register: apiserver_logs
      changed_when: false
      when: apiserver_active.stdout != "active"

    - name: Fail if kube-apiserver did not become active
      ansible.builtin.fail:
        msg: |
          kube-apiserver status: {{ apiserver_active.stdout }}
          --- Logs (last 40 lines) ---
          {{ apiserver_logs.stdout | default('(no logs)') }}
      when: apiserver_active.stdout != "active"

    - name: Wait for kube-apiserver to be reachable
      ansible.builtin.command:
        cmd: kubectl --kubeconfig=/etc/kubernetes/admin.kubeconfig get nodes --request-timeout=2s
      register: api_health
      retries: 24
      delay: 5
      until: api_health is succeeded
      changed_when: false

    - name: Start kube-controller-manager
      ansible.builtin.systemd:
        name: kube-controller-manager
        state: started
        enabled: true

    - name: Start kube-scheduler
      ansible.builtin.systemd:
        name: kube-scheduler
        state: started
        enabled: true

- name: Stage 5 — Apply kubelet RBAC rules
  hosts: control_plane
  gather_facts: false
  tasks:
    - name: Check if RBAC rules already applied
      ansible.builtin.command:
        cmd: kubectl --kubeconfig=/etc/kubernetes/admin.kubeconfig get clusterrole system:kubelet-bootstrap
      register: rbac_check
      changed_when: false
      failed_when: false

    - name: Apply kubelet RBAC ClusterRole and bindings
      ansible.builtin.shell: |
        kubectl --kubeconfig=/etc/kubernetes/admin.kubeconfig apply -f - <<'RBAC_EOF'
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        metadata:
          name: system:kubelet-bootstrap
        rules:
        - apiGroups: ["certificates.k8s.io"]
          resources: ["certificatesigningrequests"]
          verbs: ["create", "get", "list", "watch"]
        ---
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: system:kubelet-bootstrap
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: system:kubelet-bootstrap
        subjects:
        - apiGroup: rbac.authorization.k8s.io
          kind: Group
          name: system:nodes
        ---
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: system:nodes
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: system:node
        subjects:
        - apiGroup: rbac.authorization.k8s.io
          kind: Group
          name: system:nodes
        RBAC_EOF
      args:
        executable: /bin/bash
      when: rbac_check.rc != 0

    - name: Bind system:masters to cluster-admin for full admin access
      ansible.builtin.shell: |
        kubectl --kubeconfig=/etc/kubernetes/admin.kubeconfig apply -f - <<'ADMIN_EOF'
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: system:admin
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: cluster-admin
        subjects:
        - apiGroup: rbac.authorization.k8s.io
          kind: Group
          name: system:masters
        ADMIN_EOF
      args:
        executable: /bin/bash
      changed_when: false

- name: Stage 6 — Start kubelet on all cluster nodes
  hosts: cluster
  gather_facts: false
  vars:
    certs_dir: "{{ playbook_dir }}/../../certs"
  roles:
    - role: kubelet

- name: Stage 7 — Install Cilium + L2 announcements
  hosts: control_plane
  gather_facts: false
  roles:
    - role: cilium

- name: Stage 8 — Add host route for LB pool
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Discover libvirt bridge for cluster network
      ansible.builtin.command:
        cmd: virsh -c qemu:///system net-info k8s-cluster-net
      register: net_info
      changed_when: false
      failed_when: false

    - name: Extract bridge name from net-info
      ansible.builtin.set_fact:
        lb_bridge: "{{ net_info.stdout | regex_search('Bridge:\\s+(\\S+)', '\\1') | first | default('virbr0') }}"

    - name: Check if route already exists
      ansible.builtin.command:
        cmd: ip route show 10.0.10.0/24
      register: route_check
      changed_when: false
      failed_when: false

    - name: Add route for LB pool CIDR via cluster bridge
      ansible.builtin.command:
        cmd: ip route add 10.0.10.0/24 dev {{ lb_bridge }}
      become: true
      when: "lb_bridge not in (route_check.stdout | default(''))"

- name: Stage 9 — Cluster health check
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Check nodes
      ansible.builtin.command:
        cmd: kubectl --kubeconfig {{ playbook_dir }}/../../kubeconfig get nodes -o wide
      register: nodes
      changed_when: false

    - name: Display nodes
      ansible.builtin.debug:
        var: nodes.stdout_lines

    - name: Check control-plane services
      ansible.builtin.command:
        cmd: kubectl --kubeconfig {{ playbook_dir }}/../../kubeconfig get pods -n kube-system
      register: pods
      changed_when: false

    - name: Display kube-system pods
      ansible.builtin.debug:
        var: pods.stdout_lines
