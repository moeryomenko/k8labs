---
# kubernetes-cp — Configure and start control-plane services on CP node
#
# Distributes TLS certificates from the host to the CP node,
# resolves placeholders, then starts control-plane services.
#
# NOTE: The bootstrap playbook now uses distribute-certs.yml separately
# to allow etcd to start before CP services. This main.yml is kept for
# backward compatibility (single-role-include mode).

- name: Include certificate distribution tasks
  ansible.builtin.include_tasks: distribute-certs.yml

# ---------------------------------------------------------------------------
# Resolve CP_IP placeholder in systemd unit files
# ---------------------------------------------------------------------------
- name: Resolve {{CP_IP}} placeholder in kube-apiserver systemd unit
  ansible.builtin.replace:
    path: /usr/lib/systemd/system/kube-apiserver.service
    regexp: "{{ '{{CP_IP}}' }}"
    replace: "{{ cp_ip }}"
  failed_when: false

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

# ---------------------------------------------------------------------------
# Start control-plane services
# ---------------------------------------------------------------------------
- name: Start kube-apiserver
  ansible.builtin.systemd:
    name: kube-apiserver
    state: started
    enabled: true

- name: Wait for kube-apiserver to be reachable
  ansible.builtin.command:
    cmd: kubectl --kubeconfig=/etc/kubernetes/admin.kubeconfig get nodes --request-timeout=2s
  register: api_health
  retries: 24
  delay: 5
  until: api_health is succeeded
  changed_when: false

- name: Start kube-controller-manager
  ansible.builtin.systemd:
    name: kube-controller-manager
    state: started
    enabled: true

- name: Start kube-scheduler
  ansible.builtin.systemd:
    name: kube-scheduler
    state: started
    enabled: true
