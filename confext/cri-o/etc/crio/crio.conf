# CRI-O daemon configuration
# Managed by systemd-confext — do not edit directly on the node.

[crio]
  [crio.api]
    listen = "/var/run/crio/crio.sock"

  [crio.runtime]
    default_runtime = "crun"
    pause_image = "registry.k8s.io/pause:3.9"
    conmon = "/usr/bin/conmon"
    conmonrs = "/usr/bin/conmonrs"
    log_level = "info"
